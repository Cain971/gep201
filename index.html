<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEP201 · Gestión de Evaluación</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=Source+Serif+4:opsz,wght@8..60,300;400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f2ec;
  --bg2: #edeae2;
  --surface: #ffffff;
  --border: #d8d2c4;
  --border-dark: #b8b0a0;
  --text: #1a1814;
  --text-mid: #4a4540;
  --text-muted: #8a8278;
  --text-dim: #b8b0a0;
  --accent: #8b4513;
  --accent-light: #f0e8dc;
  --accent-mid: #c47840;
  --g1: #2c5f8a; --g1-bg: #eaf0f7;
  --g2: #2d7a4f; --g2-bg: #eaf4ee;
  --g3: #7a3d6e; --g3-bg: #f4eaf2;
  --ok: #2d6a4f;
  --warn: #e76f00;
  --danger: #c1121f;
  --radius: 3px;
  --shadow: 0 1px 4px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Source Serif 4', serif;
  min-height: 100vh;
  font-size: 14px;
}

/* ── HEADER ── */
header {
  background: #1a1814;
  color: #f5f2ec;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  border-bottom: 2px solid var(--accent);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-title {
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  font-weight: 700;
}
.header-title span { color: var(--accent-mid); }
.header-meta {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: #6a6460;
  letter-spacing: 0.08em;
}
.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-field {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: #6a6460;
}
.header-field label { white-space: nowrap; }
.header-field input {
  background: #2a2620;
  border: 1px solid #3a3630;
  color: #f5f2ec;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  padding: 4px 7px;
  border-radius: var(--radius);
  outline: none;
  width: 160px;
}
.header-field input[type=date] { width: 120px; }
.sync-dot {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  padding: 3px 10px;
  border-radius: 20px;
  background: #2a2620;
  color: #5a5450;
  transition: all 0.3s;
  white-space: nowrap;
}
.sync-dot.ok { color: #4a9a6a; background: #0a2a18; }
.sync-dot.syncing { color: #c47840; background: #2a2008; }
.sync-dot.error { color: #e05050; background: #2a0808; }

/* ── MODE SELECTOR ── */
.mode-bar {
  display: flex;
  gap: 0;
  background: #13110e;
  border-bottom: 1px solid #2a2620;
  padding: 0 24px;
}
.mode-tab {
  padding: 10px 20px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #5a5450;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  white-space: nowrap;
}
.mode-tab:hover { color: #a89880; }
.mode-tab.active { color: var(--accent-mid); border-bottom-color: var(--accent-mid); }

/* ── LAYOUT ── */
.app-layout {
  display: grid;
  grid-template-columns: 250px 1fr 290px;
  min-height: calc(100vh - 84px);
}

/* ── LEFT PANEL ── */
.panel-left {
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
}
.panel-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 12px 14px 8px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 2;
}
.group-block { border-bottom: 1px solid var(--border); }
.group-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 9px 14px 5px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.g1 .group-label { color: var(--g1); }
.g2 .group-label { color: var(--g2); }
.g3 .group-label { color: var(--g3); }
.group-label::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}
.g1 .group-label::before { background: var(--g1); }
.g2 .group-label::before { background: var(--g2); }
.g3 .group-label::before { background: var(--g3); }

.student-row {
  display: flex;
  align-items: center;
  width: 100%;
  padding: 7px 14px;
  background: none;
  border: none;
  cursor: pointer;
  text-align: left;
  gap: 7px;
  transition: background 0.1s;
}
.student-row:hover { background: var(--bg); }
.student-row.active { background: var(--accent-light) !important; }
.student-row.graded { opacity: 0.7; }

.s-indicator {
  width: 18px; height: 18px;
  border-radius: 50%;
  border: 1.5px solid var(--border-dark);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px;
  flex-shrink: 0;
  font-family: 'IBM Plex Mono', monospace;
  transition: all 0.15s;
}
.student-row.active .s-indicator { background: var(--accent); border-color: var(--accent); color: white; }
.student-row.graded .s-indicator { background: var(--ok); border-color: var(--ok); color: white; }

/* Mode 3 role badges */
.student-row.role-presenter .s-indicator { background: var(--g1); border-color: var(--g1); color: white; }
.student-row.role-responder .s-indicator { background: var(--g3); border-color: var(--g3); color: white; }

.s-name {
  flex: 1;
  font-size: 12px;
  line-height: 1.3;
  color: var(--text);
}
.s-name small { font-size: 10px; color: var(--text-muted); display: block; }
.s-codigo {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--text-dim);
}
.s-badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  min-width: 22px;
  text-align: right;
  color: var(--ok);
}

/* ── CENTER PANEL ── */
.panel-center {
  padding: 18px 22px;
  overflow-y: auto;
}

.active-banner {
  background: var(--accent-light);
  border: 1px solid #d4a870;
  border-radius: var(--radius);
  padding: 11px 14px;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.active-banner.empty { background: var(--bg2); border-color: var(--border); }
.banner-name {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
}
.banner-name.ph { color: var(--text-muted); font-style: italic; font-weight: 400; font-size: 13px; }
.banner-sub {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* Question blocks */
.dim-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 14px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.dim-head {
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  user-select: none;
}
.dim-head:hover { background: var(--bg); }
.dim-num {
  width: 20px; height: 20px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  flex-shrink: 0;
}
.dd .dim-num { background: #dceeff; color: #1a5080; }
.dj .dim-num { background: #dcf0e4; color: #1a5030; }
.dm .dim-num { background: #f0e4dc; color: #80300a; }
.dt .dim-num { background: #e4dcf0; color: #30086a; }

.dim-title {
  font-family: 'Playfair Display', serif;
  font-size: 14px;
  font-weight: 700;
  flex: 1;
}
.dim-used {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--text-muted);
  background: var(--bg);
  padding: 2px 7px;
  border-radius: 10px;
}
.dim-arrow { font-size: 9px; color: var(--text-dim); transition: transform 0.2s; }
.dim-block.collapsed .dim-arrow { transform: rotate(-90deg); }
.dim-block.collapsed .dim-body { display: none; }

.level-group { padding: 4px 10px 6px; }
.level-hdr {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 7px 4px 4px;
  border-bottom: 1px dashed var(--border);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.lh1 { color: #2d6a4f; }
.lh2 { color: #e76f00; }
.lh3 { color: #4a4540; }
.lh-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.lh1 .lh-dot { background: #2d6a4f; }
.lh2 .lh-dot { background: #e76f00; }
.lh3 .lh-dot { background: #4a4540; }

.q-item {
  display: flex;
  align-items: flex-start;
  gap: 7px;
  padding: 6px 4px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background 0.1s;
  margin-bottom: 1px;
}
.q-item:hover { background: var(--bg); }
.q-item.used { opacity: 0.35; }
.q-item.used .q-txt { text-decoration: line-through; }
.q-chk {
  width: 15px; height: 15px;
  border: 1.5px solid var(--border-dark);
  border-radius: 2px;
  flex-shrink: 0;
  margin-top: 2px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px;
  transition: all 0.12s;
}
.q-item.used .q-chk { background: var(--text-muted); border-color: var(--text-muted); color: white; }
.q-txt { font-size: 12px; color: var(--text); line-height: 1.45; flex: 1; }

/* Mode 2 — quick participation */
.quick-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  box-shadow: var(--shadow);
  max-width: 480px;
}
.quick-title {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 14px;
  color: var(--text);
}
.instr-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 14px;
}
.instr-chip {
  padding: 5px 12px;
  border: 1px solid var(--border);
  border-radius: 20px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.12s;
  background: var(--bg);
}
.instr-chip:hover { border-color: var(--accent-mid); color: var(--accent); }
.instr-chip.selected { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: 500; }

/* Mode 3 — TF roles */
.role-selector {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.role-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.role-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.role-chip {
  padding: 5px 12px;
  border-radius: 20px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  border: 1px solid var(--border);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.12s;
  background: var(--bg);
}
.role-chip:hover { border-color: var(--border-dark); }
.role-chip.selected-p { background: var(--g1-bg); border-color: var(--g1); color: var(--g1); font-weight: 500; }
.role-chip.selected-r { background: var(--g3-bg); border-color: var(--g3); color: var(--g3); font-weight: 500; }

.section-assign-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.sec-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
}
.sec-row:last-child { border-bottom: none; }
.sec-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  min-width: 80px;
}
.sec-name {
  font-size: 12px;
  color: var(--text);
  flex: 1;
  font-style: italic;
}
.sec-presenter {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--g1);
  font-weight: 500;
}

/* ── RIGHT PANEL ── */
.panel-right {
  background: var(--surface);
  border-left: 1px solid var(--border);
  overflow-y: auto;
}
.r-section {
  padding: 14px;
  border-bottom: 1px solid var(--border);
}
.r-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
}

/* Nivel buttons */
.nivel-opt {
  width: 100%;
  padding: 9px 11px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
  transition: all 0.12s;
}
.nivel-opt:hover { border-color: var(--border-dark); background: var(--bg2); }
.nivel-opt.sel.nv-full { background: #d8f3dc; border-color: #2d6a4f; }
.nivel-opt.sel.nv-partial { background: #fff3e0; border-color: #f0a030; }
.nivel-opt.sel.nv-poor { background: #fff0e0; border-color: #e76f00; }
.nivel-opt.sel.nv-none { background: #ffe0e0; border-color: #c1121f; }
.nv-icon { font-size: 13px; width: 18px; text-align: center; flex-shrink: 0; }
.nv-info { flex: 1; }
.nv-name { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 500; }
.nv-desc { font-size: 11px; color: var(--text-muted); line-height: 1.3; margin-top: 1px; }
.nv-effect { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 500; flex-shrink: 0; }
.nv-full .nv-effect { color: #2d6a4f; }
.nv-partial .nv-effect { color: #8a6000; }
.nv-poor .nv-effect { color: #e76f00; }
.nv-none .nv-effect { color: #c1121f; }

/* Bonus */
.bonus-row {
  display: flex;
  align-items: center;
  gap: 7px;
  cursor: pointer;
}
.bonus-row input[type=checkbox] { accent-color: var(--ok); width: 14px; height: 14px; cursor: pointer; }
.bonus-lbl { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text-muted); cursor: pointer; }

/* Ajuste display */
.ajuste-box {
  background: #1a1814;
  border-radius: var(--radius);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.aj-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: #5a5450; }
.aj-calc { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #4a4540; margin-top: 3px; }
.aj-value { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 900; color: var(--accent-mid); line-height: 1; }

/* Obs & register */
.obs-area {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 7px 9px;
  font-family: 'Source Serif 4', serif;
  font-size: 12px;
  color: var(--text);
  background: var(--bg);
  resize: vertical;
  min-height: 54px;
  outline: none;
  line-height: 1.5;
}
.obs-area:focus { border-color: var(--accent-mid); }

.btn-reg {
  width: 100%;
  padding: 12px;
  background: #1a1814;
  color: var(--accent-mid);
  border: none;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: var(--radius);
  transition: all 0.15s;
  margin-top: 4px;
}
.btn-reg:hover { background: #2a2420; }
.btn-reg:disabled { opacity: 0.35; cursor: not-allowed; }

/* History */
.hist-item {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.hi-adj {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
  min-width: 36px;
  text-align: center;
  flex-shrink: 0;
  line-height: 1;
  padding-top: 2px;
}
.hi-adj.pos { color: var(--ok); }
.hi-adj.neg { color: var(--danger); }
.hi-adj.neu { color: var(--text-muted); }
.hi-info { flex: 1; }
.hi-name { font-size: 12px; font-weight: 600; color: var(--text); }
.hi-meta { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--text-muted); margin-top: 2px; }
.hi-obs { font-size: 11px; color: var(--text-muted); font-style: italic; margin-top: 2px; }

/* Toast */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: #1a1814;
  color: #f5f2ec;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  padding: 9px 18px;
  border-radius: 20px;
  border-left: 3px solid var(--accent-mid);
  transition: transform 0.25s ease;
  z-index: 999;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.err { border-left-color: var(--danger); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: 2px; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div>
    <div class="header-title">GEP201 · <span>Gestión de Evaluación</span></div>
    <div class="header-meta">FGAD · PUCP · 2026-1</div>
  </div>
  <div class="header-right">
    <div class="header-field">
      <label>Sesión</label>
      <input type="text" id="inp-sesion" value="Clase 3">
    </div>
    <div class="header-field">
      <label>Fecha</label>
      <input type="date" id="inp-fecha">
    </div>
    <div class="sync-dot" id="sync-dot">● —</div>
  </div>
</header>

<!-- MODE BAR -->
<div class="mode-bar">
  <div class="mode-tab active" data-mode="1" onclick="setMode(1)">Modo 1 · Dinámica RP</div>
  <div class="mode-tab" data-mode="2" onclick="setMode(2)">Modo 2 · Participación</div>
  <div class="mode-tab" data-mode="3" onclick="setMode(3)">Modo 3 · Sustentación TF</div>
</div>

<!-- APP LAYOUT -->
<div class="app-layout">

  <!-- LEFT -->
  <div class="panel-left" id="panel-left">
    <div class="panel-title" id="left-title">Alumnos</div>
    <div id="students-list"></div>
  </div>

  <!-- CENTER -->
  <div class="panel-center" id="panel-center">
    <!-- Banner -->
    <div class="active-banner empty" id="active-banner">
      <div style="font-size:16px">👤</div>
      <div>
        <div class="banner-name ph" id="banner-name">— Selecciona un alumno —</div>
        <div class="banner-sub" id="banner-sub"></div>
      </div>
    </div>
    <!-- Dynamic content here -->
    <div id="center-content"></div>
  </div>

  <!-- RIGHT -->
  <div class="panel-right" id="panel-right">
    <!-- Instrumento (shown in modes 1 and 3) -->
    <div class="r-section" id="r-instrumento">
      <div class="r-title">Instrumento</div>
      <div class="instr-chips" id="instr-chips-right"></div>
    </div>

    <!-- Nivel -->
    <div class="r-section" id="r-nivel">
      <div class="r-title">Desempeño oral</div>
      <div id="nivel-opts"></div>
    </div>

    <!-- Bonus -->
    <div class="r-section">
      <div class="r-title">Bonus</div>
      <label class="bonus-row">
        <input type="checkbox" id="chk-bonus">
        <span class="bonus-lbl">Intervención destacada (+1 punto)</span>

</div>

<script>
// ═══════════════════════════════════════════════════════════════════

// Secciones del TF (para asignación de presentadores)
const TF_SECTIONS = [

// Instrumentos disponibles
const INSTRUMENTOS_RP   = ['RP1','RP2','RP3'];

const NIVELES = [

// ═══════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════

let S = {
  mode: 1,
  activeStudent: null,         // full student object
  selectedInstrumento: null,
  selectedNivel: null,
  bonusActive: false,
  usedQuestions: new Set(),
  sessionHistory: [],
  graded: {},                  // code → { ajuste, instrumento }
  // Mode 3
  roles: {},                   // code → 'presenter'|'responder'
  sectionAssign: {},           // section index → student name
};

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('inp-fecha').value = new Date().toISOString().split('T')[0];
  document.getElementById('chk-bonus').addEventListener('change', e => {
    S.bonusActive = e.target.checked;
    updateAjuste();
  });
  setMode(1);
  checkConnection();
});

// ═══════════════════════════════════════════════════════════════════
// MODE SWITCH
// ═══════════════════════════════════════════════════════════════════

function setMode(m) {
  S.mode = m;
  S.activeStudent = null;
  S.selectedNivel = null;
  S.bonusActive = false;
  document.getElementById('chk-bonus').checked = false;
  document.getElementById('inp-obs').value = '';

  document.querySelectorAll('.mode-tab').forEach(t => {
    t.classList.toggle('active', parseInt(t.dataset.mode) === m);
  });

  // instrumento defaults
  if (m === 1) {
    S.selectedInstrumento = 'RP1';
    renderInstrumentosRight(INSTRUMENTOS_RP);
  } else if (m === 2) {
    S.selectedInstrumento = 'CL1';
    renderInstrumentosRight(INSTRUMENTOS_PART);
  } else {
    S.selectedInstrumento = 'TF';
    renderInstrumentosRight(INSTRUMENTOS_TF);
  }

  // show/hide right instrumento section
  document.getElementById('r-instrumento').style.display = (m === 2) ? 'block' : 'block'; // always show

  renderStudents();
  renderCenter();
  renderNiveles();
  resetBanner();
  updateAjuste();
}

// ═══════════════════════════════════════════════════════════════════
// STUDENTS
// ═══════════════════════════════════════════════════════════════════

function renderStudents() {
  const container = document.getElementById('students-list');
  container.innerHTML = '';
  const groups = [...new Set(STUDENTS.map(s => s.group))];

  groups.forEach(group => {
    const members = STUDENTS.filter(s => s.group === group);
    const gCls = group === 'GRUPO 1' ? 'g1' : group === 'GRUPO 2' ? 'g2' : 'g3';
    const block = document.createElement('div');
    block.className = `group-block ${gCls}`;
    block.innerHTML = `<div class="group-label">${group}</div>`;

    members.forEach(st => {
      const isActive = S.activeStudent?.code === st.code;
      const graded = S.graded[st.code];
      const role = S.roles[st.code];

      let roleCls = '';
      let indicatorTxt = '';
      if (isActive) { roleCls = 'active'; indicatorTxt = '→'; }
      else if (graded) { roleCls = 'graded'; indicatorTxt = '✓'; }
      else if (role === 'presenter') { roleCls = 'role-presenter'; indicatorTxt = 'P'; }
      else if (role === 'responder') { roleCls = 'role-responder'; indicatorTxt = 'R'; }

      const btn = document.createElement('button');
      btn.className = `student-row ${roleCls}`;
      const fn = st.name.split(' ')[0];
      const ln = st.name.split(' ').slice(1).join(' ');
      btn.innerHTML = `
        <div class="s-indicator">${indicatorTxt}</div>
        <div class="s-name">${fn}<small>${ln}</small></div>
        <div class="s-codigo">${st.code}</div>
        ${graded ? `<div class="s-badge">${graded.ajuste >= 0 ? '+' : ''}${graded.ajuste}</div>` : ''}
      `;
      btn.addEventListener('click', () => selectStudent(st));
      block.appendChild(btn);
    });
    container.appendChild(block);
  });
}

function selectStudent(st) {
  S.activeStudent = st;
  S.selectedNivel = null;
  S.bonusActive = false;
  document.getElementById('chk-bonus').checked = false;
  document.getElementById('inp-obs').value = '';

  // Banner
  document.getElementById('banner-name').textContent = st.name;
  document.getElementById('banner-name').classList.remove('ph');
  document.getElementById('active-banner').classList.remove('empty');

  const roleLabel = S.roles[st.code] === 'presenter' ? 'Presentador' :
                    S.roles[st.code] === 'responder'  ? 'Respondedor' : '';
  document.getElementById('banner-sub').textContent =
    `${st.group} · Código ${st.code}${roleLabel ? ' · ' + roleLabel : ''}`;

  renderStudents();
  renderNiveles();

  // In mode 3, update center role selector
  if (S.mode === 3) renderCenter();

  updateAjuste();
}

// ═══════════════════════════════════════════════════════════════════
// CENTER
// ═══════════════════════════════════════════════════════════════════

function renderCenter() {
  const cc = document.getElementById('center-content');
  cc.innerHTML = '';

  if (S.mode === 1) renderQuestionsForInstrumento(cc, S.selectedInstrumento || 'RP1');
  else if (S.mode === 2) renderMode2Center(cc);
  else if (S.mode === 3) renderMode3Center(cc);
}

function renderQuestionsForInstrumento(container, instr) {
  const qBank = QUESTIONS[instr];
  if (!qBank) { container.innerHTML = `<p style="color:var(--text-muted);font-size:12px;padding:8px 0">Sin preguntas configuradas para ${instr}.</p>`; return; }

  Object.entries(qBank).forEach(([key, dim]) => {
    if (key === '_placeholder') {
      container.innerHTML = `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;font-size:11px">Preguntas para ${instr} pendientes de configuración.</div>`;
      return;
    }
    const allQs = Object.values(dim.levels).flat();
    const usedCount = allQs.filter(q => S.usedQuestions.has(q)).length;

    const block = document.createElement('div');
    block.className = `dim-block ${dim.cls}`;
    block.id = `dim-${key}`;
    block.innerHTML = `
      <div class="dim-head" onclick="toggleDim('${key}')">
        <div class="dim-num">${dim.num}</div>
        <div class="dim-title">${dim.title}</div>
        <div class="dim-used">${usedCount}/${allQs.length} usadas</div>
        <div class="dim-arrow">▼</div>
      </div>
      <div class="dim-body" id="dimb-${key}"></div>
    `;

    const body = block.querySelector(`#dimb-${key}`);
    const lvlLabels = { 1:'Nivel 1 · Verificación de dominio', 2:'Nivel 2 · Comprensión del proceso', 3:'Nivel 3 · Juicio aplicado' };
    const lvlCls    = { 1:'lh1', 2:'lh2', 3:'lh3' };

    Object.entries(dim.levels).forEach(([lvl, qs]) => {
      if (!qs.length) return;
      const lg = document.createElement('div');
      lg.className = 'level-group';
      lg.innerHTML = `<div class="level-hdr ${lvlCls[lvl]}"><span class="lh-dot"></span>${lvlLabels[lvl]}</div>`;
      qs.forEach(q => {
        const used = S.usedQuestions.has(q);
        const item = document.createElement('div');
        item.className = `q-item${used ? ' used' : ''}`;
        item.innerHTML = `<div class="q-chk">${used ? '✓' : ''}</div><div class="q-txt">${q}</div>`;
        item.addEventListener('click', () => { toggleQ(q); renderCenter(); });
        lg.appendChild(item);
      });
      body.appendChild(lg);
    });
    container.appendChild(block);
  });
}

function renderMode2Center(cc) {
  cc.innerHTML = `
    <div class="quick-panel">
      <div class="quick-title">Registro de participación</div>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px;line-height:1.5">
        Selecciona el alumno en el panel izquierdo, elige el instrumento al que suma en el panel derecho, y registra el bonus con observación.
      </p>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-muted)">
        En este modo solo se registra el ajuste de participación (+1).<br>
        El nivel de desempeño no aplica — activa el bonus en el panel derecho.
      </div>
    </div>
  `;
  // In mode 2, nivel panel is hidden, only bonus matters
  document.getElementById('r-nivel').style.display = 'none';
}

function renderMode3Center(cc) {
  document.getElementById('r-nivel').style.display = '';

  // Role selector for active student
  if (S.activeStudent) {
    const currentRole = S.roles[S.activeStudent.code] || null;
    const roleBox = document.createElement('div');
    roleBox.className = 'role-selector';
    roleBox.innerHTML = `
      <div class="role-title">Rol de ${S.activeStudent.name.split(' ')[0]}</div>
      <div class="role-chips">
        <div class="role-chip${currentRole==='presenter'?' selected-p':''}" onclick="setRole('presenter')">📋 Presentador</div>
        <div class="role-chip${currentRole==='responder'?' selected-r':''}" onclick="setRole('responder')">❓ Respondedor</div>
      </div>
    `;
    cc.appendChild(roleBox);
  }

  // Section assignments
  const presenters = STUDENTS.filter(s => S.roles[s.code] === 'presenter');
  if (presenters.length > 0) {
    const secBox = document.createElement('div');
    secBox.className = 'section-assign-box';
    secBox.innerHTML = `<div class="r-title" style="margin-bottom:8px">Asignación de secciones</div>` +
      TF_SECTIONS.map((sec, i) => {
        const presenter = presenters[i] ? presenters[i].name.split(' ')[0] + ' ' + presenters[i].name.split(' ')[1] : '—';
        return `<div class="sec-row">
          <div class="sec-label">Sección ${i+1}</div>
          <div class="sec-name">${sec}</div>
          <div class="sec-presenter">${presenter}</div>
        </div>`;
      }).join('');
    cc.appendChild(secBox);
  }

  // Questions
  renderQuestionsForInstrumento(cc, 'TF');
}

// ═══════════════════════════════════════════════════════════════════
// INSTRUMENTOS
// ═══════════════════════════════════════════════════════════════════

function renderInstrumentosRight(list) {
  const container = document.getElementById('instr-chips-right');
  container.innerHTML = '';
  list.forEach(id => {
    const chip = document.createElement('div');
    chip.className = `instr-chip${S.selectedInstrumento === id ? ' selected' : ''}`;
    chip.textContent = id;
    chip.addEventListener('click', () => {
      S.selectedInstrumento = id;
      renderInstrumentosRight(list);
      if (S.mode === 1) renderCenter();
    });
    container.appendChild(chip);
  });

// ═══════════════════════════════════════════════════════════════════
// NIVELES
// ═══════════════════════════════════════════════════════════════════

function renderNiveles() {
  if (S.mode === 2) { document.getElementById('r-nivel').style.display = 'none'; return; }
  document.getElementById('r-nivel').style.display = '';
  const container = document.getElementById('nivel-opts');
  container.innerHTML = '';
  NIVELES.forEach(n => {
    const btn = document.createElement('div');
    btn.className = `nivel-opt ${n.cls}${S.selectedNivel === n.id ? ' sel' : ''}`;
    btn.innerHTML = `
      <div class="nv-icon">${n.icon}</div>
      <div class="nv-info">
        <div class="nv-name">${n.name}</div>
        <div class="nv-desc">${n.desc}</div>
      </div>
      <div class="nv-effect ${n.cls}">${n.effect}</div>
    `;
    btn.addEventListener('click', () => { S.selectedNivel = n.id; renderNiveles(); updateAjuste(); });
    container.appendChild(btn);
  });
}

// ═══════════════════════════════════════════════════════════════════
// AJUSTE CALCULATION
// ═══════════════════════════════════════════════════════════════════

function calcAjuste() {
  const bonus = S.bonusActive ? 1 : 0;
  if (S.mode === 2) return bonus; // participación: solo bonus

  const nivel = NIVELES.find(n => n.id === S.selectedNivel);
  if (!nivel) return null;

  if (nivel.delta === null) {
    // piso 10: adjustement stored as special marker
    return bonus > 0 ? 'piso10+bonus' : 'piso10';
  }
  return nivel.delta + bonus;
}

function updateAjuste() {
  const aj = calcAjuste();
  const valEl = document.getElementById('aj-value');
  const calcEl = document.getElementById('aj-calc');

  if (aj === null) { valEl.textContent = '—'; calcEl.textContent = '—'; return; }

  if (typeof aj === 'string' && aj.startsWith('piso10')) {
    valEl.textContent = aj.includes('bonus') ? '10+1' : '10';
    calcEl.textContent = 'Nota individual fija = 10' + (aj.includes('bonus') ? ' + bonus' : '');
  } else {
    const sign = aj >= 0 ? '+' : '';
    valEl.textContent = `${sign}${aj}`;
    const parts = [];
    const nivel = NIVELES.find(n => n.id === S.selectedNivel);
    if (nivel && nivel.delta !== 0) parts.push(`nivel: ${nivel.delta}`);
    if (S.bonusActive) parts.push('+1 bonus');
    calcEl.textContent = parts.length ? parts.join(', ') : 'sin cambio';
  }
}

// ═══════════════════════════════════════════════════════════════════
// REGISTER
// ═══════════════════════════════════════════════════════════════════

async function registrar() {
  if (!S.activeStudent) { toast('Selecciona un alumno primero', true); return; }
  if (!S.selectedInstrumento) { toast('Selecciona el instrumento', true); return; }
  if (S.mode !== 2 && !S.selectedNivel && !S.bonusActive) { toast('Selecciona el nivel de desempeño', true); return; }
  if (S.mode === 2 && !S.bonusActive) { toast('Activa el bonus para registrar participación', true); return; }

  const aj = calcAjuste();
  const ajStr = typeof aj === 'string' ? aj : String(aj);

  const nivel = NIVELES.find(n => n.id === S.selectedNivel);
  const rol = S.mode === 3 ? (S.roles[S.activeStudent.code] || 'no asignado') :
              S.mode === 2 ? 'participacion' : 'dinamica';

  const payload = {
    action: 'registrar_sesion',
    fecha: document.getElementById('inp-fecha').value,
    sesion: document.getElementById('inp-sesion').value,
    modo: `Modo ${S.mode}`,
    instrumento: S.selectedInstrumento,
    codigo: S.activeStudent.code,
    alumno: S.activeStudent.name,
    grupo: S.activeStudent.group,
    rol: rol,
    ajuste: ajStr,
    nivel: nivel ? nivel.name : (S.mode === 2 ? 'Participación' : '—'),
    observacion: document.getElementById('inp-obs').value
  };

  setSyncStatus('syncing');
  document.getElementById('btn-reg').disabled = true;

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    // Update local state
    S.graded[S.activeStudent.code] = {
      ajuste: typeof aj === 'string' ? aj : aj,
      instrumento: S.selectedInstrumento
    };
    S.sessionHistory.push({ ...payload, displayAj: ajStr });

    setSyncStatus('ok');
    toast(`✓ ${S.activeStudent.name.split(' ')[0]} registrado · ${S.selectedInstrumento} · ajuste: ${ajStr}`);

    renderStudents();
    renderHistory();
    resetRight();

  } catch(err) {
    setSyncStatus('error');
    toast('Error al conectar con Google Sheets', true);
  } finally {
    document.getElementById('btn-reg').disabled = false;
  }
}

function resetRight() {
  S.selectedNivel = null;
  S.bonusActive = false;
  document.getElementById('chk-bonus').checked = false;
  document.getElementById('inp-obs').value = '';
  renderNiveles();
  updateAjuste();
}

// ═══════════════════════════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════════════════════════

function renderHistory() {
  const container = document.getElementById('hist-list');
  if (!S.sessionHistory.length) {
    container.innerHTML = `<div style="padding:8px 0;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-dim);text-align:center">Sin registros aún</div>`;
    return;
  }
  container.innerHTML = '';
  [...S.sessionHistory].reverse().forEach(r => {
    const aj = r.displayAj;
    const isPiso = typeof aj === 'string' && aj.startsWith('piso10');
    const num = isPiso ? 10 : parseFloat(aj);
    const cls = isPiso ? 'neu' : (num > 0 ? 'pos' : num < 0 ? 'neg' : 'neu');
    const displayAj = isPiso ? '10' : (num >= 0 ? `+${num}` : `${num}`);
    const item = document.createElement('div');
    item.className = 'hist-item';
    item.innerHTML = `
      <div class="hi-adj ${cls}">${displayAj}</div>
      <div class="hi-info">
        <div class="hi-name">${r.alumno.split(' ')[0]} ${r.alumno.split(' ')[1]}</div>
        <div class="hi-meta">${r.instrumento} · ${r.grupo} · ${r.nivel}</div>
        ${r.observacion ? `<div class="hi-obs">${r.observacion}</div>` : ''}
      </div>
    `;
    container.appendChild(item);
  });
}

// ═══════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════

function toggleDim(key) {
  document.getElementById(`dim-${key}`)?.classList.toggle('collapsed');
}

function toggleQ(q) {
  if (S.usedQuestions.has(q)) S.usedQuestions.delete(q);
  else S.usedQuestions.add(q);
}

function setRole(role) {
  if (!S.activeStudent) return;
  S.roles[S.activeStudent.code] = role;
  renderStudents();
  renderCenter();
}

function resetBanner() {
  document.getElementById('banner-name').textContent = '— Selecciona un alumno —';
  document.getElementById('banner-name').classList.add('ph');
  document.getElementById('active-banner').classList.add('empty');
  document.getElementById('banner-sub').textContent = '';
}

function setSyncStatus(status) {
  const el = document.getElementById('sync-dot');
  const map = { syncing: ['syncing','● Sincronizando...'], ok: ['ok','● Guardado'], error: ['error','● Error'] };
  el.className = `sync-dot ${map[status][0]}`;
  el.textContent = map[status][1];
  if (status === 'ok') setTimeout(() => { el.textContent = '● Conectado'; }, 2500);
}

function toast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast${isErr ? ' err' : ''} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function checkConnection() {
  try {
    await fetch(SCRIPT_URL + '?ping=1', { mode: 'no-cors' });
    setSyncStatus('ok');
  } catch { setSyncStatus('error'); }
}
</script>
